<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Brahmani Motors</title>
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --accent-green: #10b981; --accent-red: #ef4444; --accent-blue: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        
        nav { padding: 20px 40px; background-color: var(--card-bg); border-bottom: 2px solid var(--accent-red); display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background-color: #334155; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .logout-btn:hover { background-color: var(--accent-red); }

        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        /* Form Section */
        .editor-panel, .inventory-panel { background-color: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        h2 { margin-bottom: 20px; color: var(--accent-red); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #cbd5e1; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; background-color: var(--bg-dark); border: 1px solid #475569; color: white; border-radius: 6px; outline: none; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-blue); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .save-btn { background-color: var(--accent-green); }
        .save-btn:hover { background-color: #059669; }
        .clear-btn { background-color: #475569; }
        .clear-btn:hover { background-color: #334155; }

        /* Inventory List Section */
        .admin-item { display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-dark); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .item-info strong { display: block; font-size: 1.1rem; color: var(--accent-blue); }
        .item-info span { font-size: 0.9rem; color: #94a3b8; }
        
        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background-color: var(--accent-blue); padding: 6px 12px; border-radius: 4px; font-size: 0.9rem; border: none; color: white; cursor: pointer;}
        .del-btn { background-color: var(--accent-red); padding: 6px 12px; border-radius: 4px; font-size: 0.9rem; border: none; color: white; cursor: pointer;}
    </style>
</head>
<body>

    <nav>
        <h2>⚙️ CMS Dashboard</h2>
        <a href="store.html" class="logout-btn">Log Out & View Store</a>
    </nav>

    <div class="dashboard-container">
        <div class="editor-panel">
            <h2 id="form-title">Add New Product</h2>
            <input type="hidden" id="prod-id"> 
            
            <div class="form-group">
                <label style="color: var(--accent-green);">1. Select Target Store</label>
                <select id="target-database" onchange="switchDatabase()">
                    <option value="storeInventory">Automotive Store (store.html)</option>
                    <option value="shopInventory">Digital Shop (shop.html)</option>
                </select>
            </div>

            <div class="form-group">
                <label>2. Photo Source (e.g., assets/image.jpg)</label>
                <input type="text" id="prod-photo" placeholder="assets/photo.jpg">
            </div>
            <div class="form-group">
                <label>3. Product Name</label>
                <input type="text" id="prod-name" placeholder="e.g., Tata Signa 4825.TK">
            </div>
            <div class="form-group">
                <label>4. Description</label>
                <textarea id="prod-desc" rows="3" placeholder="Heavy-duty vehicle..."></textarea>
            </div>
            <div class="form-group">
                <label>5. Price</label>
                <input type="text" id="prod-price" placeholder="e.g., 48.5L">
            </div>

            <div class="btn-group">
                <button class="save-btn" onclick="saveProduct()">💾 Save to Selected Store</button>
                <button class="clear-btn" onclick="resetForm()">Clear Form</button>
            </div>
        </div>

        <div class="inventory-panel">
            <h2 style="color: white;" id="inventory-title">Current Stock</h2>
            <div id="inventory-list">
                </div>
        </div>
    </div>

    <script>
        let currentDB = 'storeInventory'; // Defaults to Automotive store
        let inventory = [];

        // 1. Load data based on the selected dropdown
        function switchDatabase() {
            currentDB = document.getElementById('target-database').value;
            
            // Update the title so you know what you are looking at
            if(currentDB === 'storeInventory') document.getElementById('inventory-title').innerText = "Automotive Stock";
            if(currentDB === 'shopInventory') document.getElementById('inventory-title').innerText = "Digital Shop Stock";
            
            // Fetch the correct memory bank
            inventory = JSON.parse(localStorage.getItem(currentDB)) || [];
            
            resetForm();
            renderInventory();
        }

        // 2. Render the list on the right side
        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = ''; 

            inventory.forEach(item => {
                list.innerHTML += `
                    <div class="admin-item">
                        <div class="item-info">
                            <strong>${item.name}</strong>
                            <span>₹ ${item.price}</span>
                        </div>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="editProduct(${item.id})">Edit</button>
                            <button class="del-btn" onclick="deleteProduct(${item.id})">Delete</button>
                        </div>
                    </div>
                `;
            });
            
            // Save to the currently selected database!
            localStorage.setItem(currentDB, JSON.stringify(inventory));
        }

        // 3. Save Button Logic
        function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const photo = document.getElementById('prod-photo').value;
            const name = document.getElementById('prod-name').value;
            const desc = document.getElementById('prod-desc').value;
            const price = document.getElementById('prod-price').value;

            if(!name || !price) return alert("Name and Price are required!");

            if (id) {
                const index = inventory.findIndex(i => i.id == id);
                inventory[index] = { id: parseInt(id), photo, name, desc, price };
            } else {
                const newId = inventory.length > 0 ? Math.max(...inventory.map(i => i.id)) + 1 : 1;
                inventory.push({ id: newId, photo, name, desc, price });
            }

            resetForm();
            renderInventory();
        }

        // 4. Edit Button Logic
        function editProduct(id) {
            const item = inventory.find(i => i.id == id);
            document.getElementById('form-title').innerText = "Edit Product";
            document.getElementById('prod-id').value = item.id;
            document.getElementById('prod-photo').value = item.photo;
            document.getElementById('prod-name').value = item.name;
            document.getElementById('prod-desc').value = item.desc;
            document.getElementById('prod-price').value = item.price;
        }

        // 5. Delete Button Logic
        function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                inventory = inventory.filter(i => i.id != id);
                renderInventory();
            }
        }

        // 6. Reset Form
        function resetForm() {
            document.getElementById('form-title').innerText = "Add New Product";
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-photo').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-desc').value = '';
            document.getElementById('prod-price').value = '';
        }

        // Run on page load
        switchDatabase();
    </script>
</body>
</html>
